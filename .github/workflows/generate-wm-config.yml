# Place this file at: .github/workflows/generate-wm-config.yml
#
# PURPOSE:
#   Generates wm-config.json at the repo root from GitHub Actions secrets.
#   This file is fetched at runtime by index.html to auto-load the PAT and
#   Super Admin Token without requiring manual entry in the UI.
#
# REQUIRED SECRETS (set in GitHub repo → Settings → Secrets and variables → Actions):
#   WM_PAT      — GitHub Personal Access Token (classic) with repo scope
#   WM_SATOKEN  — 6-character Super Admin code (e.g. H7CXF9)
#
# TRIGGERS:
#   - Push to main branch (regenerates the config whenever secrets change)
#   - Manual dispatch via Actions tab (Run workflow)

name: Generate wm-config.json

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write wm-config.json
        env:
          WM_PAT: ${{ secrets.WM_PAT }}
          WM_SATOKEN: ${{ secrets.WM_SATOKEN }}
        run: |
          cat > wm-config.json <<EOF
          {
            "pat": "$WM_PAT",
            "satoken": "$WM_SATOKEN"
          }
          EOF

      - name: Commit wm-config.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wm-config.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "ci: regenerate wm-config.json from secrets"
          git push
