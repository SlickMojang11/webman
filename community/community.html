<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Community · WebMan</title>
  <link rel="stylesheet" href="community.css"/>
</head>
<body>
  <div id="app">
    <div class="comm-header">
      <div class="comm-title">💬 Community</div>
      <div class="comm-subtitle" id="commSubtitle">Loading…</div>
    </div>

    <div class="comm-body">
      <div class="composer" id="mainComposer">
        <div class="comp-avatar" id="compAvatar">👤</div>
        <div class="comp-right">
          <div class="comp-meta-row">
            <input id="compName" class="comp-name" placeholder="Your name (optional)" maxlength="32" oninput="updateComposerRole()"/>
            <span id="compRoleBadge" class="role-badge" style="display:none"></span>
          </div>
          <textarea id="compText" class="comp-text" placeholder="Share something with the community…" rows="3" oninput="updateCharCount(this,1000,'compCharCount')"></textarea>
          <div class="comp-actions">
            <span class="char-count" id="compCharCount">0 / 1000</span>
            <button class="btn-post" onclick="submitPost()">Post</button>
          </div>
        </div>
      </div>

      <div class="comm-divider"></div>

      <div id="feed">
        <div class="loading-wrap"><div class="spinner"></div><span>Loading…</span></div>
      </div>
    </div>
  </div>

  <div id="delOverlay" class="del-overlay" style="display:none" onclick="cancelDel()">
    <div class="del-card" onclick="event.stopPropagation()">
      <div style="font-size:36px;text-align:center;margin-bottom:10px">🗑️</div>
      <div class="del-title">Delete this?</div>
      <div class="del-msg" id="delMsg">This action cannot be undone.</div>
      <div class="del-actions">
        <button class="btn-del-confirm" onclick="confirmDel()">Delete</button>
        <button class="btn-del-cancel"  onclick="cancelDel()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="community.js"></script>
</body>
</html>
